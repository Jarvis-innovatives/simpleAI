<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web AI Simulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 50%, #0f1b3a 100%);
            color: #e0e0ff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 3.5em;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #00ff88 0%, #00d4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
            font-weight: 700;
            letter-spacing: 2px;
        }

        h3 {
            font-size: 1.5em;
            margin: 40px 0 20px;
            color: #00d4ff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        .box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .box:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(0, 255, 136, 0.5);
            box-shadow: 0 12px 48px rgba(0, 255, 136, 0.15);
        }

        input {
            width: 100%;
            padding: 15px 20px;
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1.5px solid rgba(0, 255, 136, 0.3);
            border-radius: 10px;
            color: #e0e0ff;
            font-size: 1em;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input::placeholder {
            color: rgba(224, 224, 255, 0.5);
        }

        input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.12);
            border-color: #00ff88;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
        }

        button {
            width: 100%;
            padding: 15px 30px;
            margin-top: 10px;
            background: linear-gradient(135deg, #00ff88 0%, #00d4ff 100%);
            border: none;
            border-radius: 10px;
            color: #000;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0, 255, 136, 0.6);
        }

        button:active {
            transform: translateY(0);
            box-shadow: 0 2px 10px rgba(0, 255, 136, 0.4);
        }

        #reply {
            margin-top: 20px;
            padding: 20px;
            background: rgba(0, 255, 136, 0.08);
            border-left: 3px solid #00ff88;
            border-radius: 8px;
            min-height: 50px;
            display: flex;
            align-items: center;
            line-height: 1.6;
            font-size: 1.05em;
            color: #00ff88;
        }

        .divider {
            width: 100%;
            max-width: 600px;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 136, 0.3), transparent);
            margin: 50px 0;
        }

        .section-title {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
        }

        .section-title::before,
        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(0, 255, 136, 0.2);
        }

        .section-title h3 {
            margin: 0 20px;
        }

        @media (max-width: 768px) {
            body {
                padding: 20px 15px;
            }

            h1 {
                font-size: 2.2em;
                margin-bottom: 20px;
            }

            .container {
                max-width: 100%;
            }

            .box {
                padding: 20px;
                margin-bottom: 15px;
                border-radius: 12px;
            }

            input {
                padding: 14px 16px;
                margin-bottom: 10px;
                font-size: 1em;
                border-radius: 8px;
            }

            button {
                padding: 14px 20px;
                font-size: 1em;
                border-radius: 8px;
                margin-top: 8px;
            }

            h3 {
                font-size: 1.3em;
                margin: 30px 0 15px;
            }

            .divider {
                margin: 30px 0;
            }

            #reply {
                padding: 15px;
                font-size: 1em;
                min-height: 45px;
            }

            .section-title h3 {
                margin: 0 15px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 15px 10px;
            }

            h1 {
                font-size: 1.8em;
                margin-bottom: 15px;
            }

            .container {
                max-width: 100%;
            }

            .box {
                padding: 15px;
                margin-bottom: 12px;
            }

            input {
                padding: 12px 14px;
                margin-bottom: 8px;
                font-size: 16px;
            }

            button {
                padding: 12px 15px;
                font-size: 0.95em;
                margin-top: 5px;
            }

            h3 {
                font-size: 1.1em;
                margin: 25px 0 12px;
            }

            .divider {
                margin: 25px 0;
            }

            #reply {
                padding: 12px;
                font-size: 0.95em;
                min-height: 40px;
            }

            .section-title {
                margin-bottom: 15px;
            }

            .section-title h3 {
                margin: 0 10px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>

<h1>🤖 AI NEURAL NET</h1>

<div class="container">
    <div class="box">
        <input id="userInput" placeholder="Ask me something...">
        <button onclick="send()">💬 Send Message</button>
        <p id="reply"></p>
    </div>

    <div class="divider"></div>

    <div class="section-title">
        <h3>🧠 TRAIN THE AI</h3>
    </div>

    <div class="box">
        <input id="question" placeholder="What's the question?">
        <input id="answer" placeholder="What's the answer?">
        <button onclick="train()">⚡ Train AI</button>
    </div>
</div>

<script>
function send() {
    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: userInput.value})
    })
    .then(res => res.json())
    .then(data => reply.innerText = "AI: " + data.reply);
}

function train() {
    fetch("/train", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            question: question.value,
            answer: answer.value
        })
    })
    .then(() => alert("AI trained successfully ✅"));
}
</script>

</body>
</html>
