<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web AI Simulator</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #00ff88;
            --secondary: #00d4ff;
            --bg-dark: #0a1128;
            --bg-deep: #050a18;
            --accent: rgba(0, 255, 136, 0.4);
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at 50% 50%, #1a1a3e 0%, #050a18 100%);
            color: #e0e0ff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 80px 20px;
            overflow-x: hidden;
        }

        /* Abstract Background Glows */
        body::before,
        body::after {
            content: '';
            position: fixed;
            width: 40vw;
            height: 40vw;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.15;
            animation: pulse-glow 10s infinite alternate;
        }

        body::before {
            top: -10%;
            left: -10%;
            background: var(--primary);
        }

        body::after {
            bottom: -10%;
            right: -10%;
            background: var(--secondary);
            animation-delay: 5s;
        }

        @keyframes pulse-glow {
            0% {
                transform: scale(1) translate(0, 0);
                opacity: 0.1;
            }

            100% {
                transform: scale(1.2) translate(10%, 10%);
                opacity: 0.2;
            }
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 8vw, 4rem);
            margin-bottom: 50px;
            text-align: center;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.15em;
            filter: drop-shadow(0 0 20px rgba(0, 255, 136, 0.3));
            animation: header-entrance 1.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes header-entrance {
            from {
                opacity: 0;
                transform: translateY(-30px) scale(0.9);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .container {
            width: 100%;
            max-width: 750px;
            position: relative;
        }

        .box {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: clamp(20px, 5vw, 50px);
            margin-bottom: 30px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.02);
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
            animation: slide-up 1s ease-out;
        }

        @keyframes slide-up {
            from {
                opacity: 0;
                transform: translateY(50px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .box:hover {
            transform: translateY(-8px) scale(1.01);
            border-color: rgba(0, 255, 136, 0.3);
            box-shadow: 0 40px 100px rgba(0, 255, 136, 0.1);
        }

        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        input {
            width: 100%;
            padding: 20px 25px;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            color: #fff;
            font-size: 1.1rem;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s ease;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.3);
            font-weight: 300;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 4px rgba(0, 255, 136, 0.1);
        }

        button {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border: none;
            border-radius: 15px;
            color: #050a18;
            font-size: 1.1rem;
            font-weight: 800;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.2);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 255, 136, 0.4);
            filter: brightness(1.1);
        }

        button:active {
            transform: translateY(1px);
        }

        #reply {
            margin-top: 40px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            border-left: 4px solid var(--primary);
            min-height: 100px;
            display: flex;
            align-items: center;
            font-size: 1.2rem;
            color: var(--primary);
            line-height: 1.8;
            font-weight: 400;
            transition: all 0.5s ease;
            box-shadow: inset 50px 0 50px -50px rgba(0, 255, 136, 0.05);
        }

        .divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            margin: 80px 0;
        }

        .section-title {
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .section-title h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            color: #fff;
            letter-spacing: 0.2em;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .section-title::after {
            content: '';
            width: 60px;
            height: 4px;
            background: var(--primary);
            border-radius: 2px;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-deep);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--glass);
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        @media (max-width: 768px) {
            body {
                padding: 40px 15px;
            }

            .box {
                padding: 30px 20px;
            }

            h1 {
                font-size: 2.5rem;
            }
        }
    </style>

</head>

<body>

    <h1>NEURAL NET AI</h1>


    <div class="container">
        <!-- Chat Section -->
        <div class="box">
            <div class="input-group">
                <input id="userInput" placeholder="Ask the Neural Net something...">
            </div>
            <button onclick="send()" id="sendBtn">💬 PROCESS MESSAGE</button>
            <div id="reply">Waiting for input...</div>
        </div>

        <div class="divider"></div>

        <!-- Training Section -->
        <div class="section-title">
            <h3>KNOWLEDGE UPLOAD</h3>
        </div>

        <div class="box">
            <div class="input-group">
                <input id="question" placeholder="New Question / Trigger">
                <input id="answer" placeholder="Expected Response">
            </div>
            <button onclick="train()" id="trainBtn">⚡ INITIALIZE TRAINING</button>
        </div>
    </div>


    <script>
        // Initialize AI Brain from localStorage or default data
        let brain = JSON.parse(localStorage.getItem('ai_brain')) || {
            "hello": "Hello 👋 I am learning!",
            "hi": "Hi there 😊",
            "what is ai": "AI is making machines think like humans.",
            "your name": "My name is NeuralNet 🤖",
            "what is your name": "I am NeuralNet, your local AI assistant.",
            "how are you": "I'm functioning perfectly in your browser! ⚡"
        };

        // Save brain to localStorage
        function saveBrain() {
            localStorage.setItem('ai_brain', JSON.stringify(brain));
        }

        function send() {
            const input = document.getElementById('userInput');
            const replyElement = document.getElementById('reply');
            const message = input.value.toLowerCase().trim();

            if (!message) return;

            // Simulate thinking effect
            replyElement.innerText = "Thinking...";

            setTimeout(() => {
                if (brain[message]) {
                    replyElement.innerText = "AI: " + brain[message];
                } else {
                    replyElement.innerText = "AI: I don't know this yet 🤔. Train me below!";
                }
                input.value = "";
            }, 300);
        }

        function train() {
            const qInput = document.getElementById('question');
            const aInput = document.getElementById('answer');
            const q = qInput.value.toLowerCase().trim();
            const a = aInput.value.trim();

            if (!q || !a) {
                alert("Please provide both a question and an answer! ⚠️");
                return;
            }

            brain[q] = a;
            saveBrain();

            qInput.value = "";
            aInput.value = "";

            // Visual feedback
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "✅ Trained!";
            btn.style.background = "linear-gradient(135deg, #00ff88 0%, #00ffbb 100%)";

            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = "";
                alert("AI has learned something new! 🧠✨");
            }, 1000);
        }

        // Add Enter key support
        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') send();
        });
    </script>


</body>

</html>
